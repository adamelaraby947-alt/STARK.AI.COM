<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STARK AI | V3 PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00f3ff; --bg: #050505; --drawer-w: 290px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            position: fixed; width: 100%; 
        }

        /* شاشات الدخول */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; background: black; }
        .active-screen { display: flex; }
        .login-card { width: 90%; max-width: 380px; padding: 40px 25px; border: 2px solid var(--neon); border-radius: 30px; text-align: center; background: rgba(0,0,0,0.95); box-shadow: 0 0 25px rgba(0, 243, 255, 0.3); }
        .login-card input { width: 100%; padding: 15px; background: #0a0a0a; border: 1px solid #222; border-radius: 15px; color: white; margin-bottom: 15px; text-align: center; }
        .btn-action { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 15px; font-weight: bold; color: black; cursor: pointer; }

        /* واجهة الشات */
        #app-screen { display: none; height: 100vh; flex-direction: column; }
        .header { padding: 15px; background: #0d0d0d; display: flex; justify-content: space-between; border-bottom: 1px solid #222; align-items: center; }
        .header h2 { color: var(--neon); margin: 0; font-size: 1.2rem; flex: 1; text-align: center; text-shadow: 0 0 10px var(--neon); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 110px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 14px; word-wrap: break-word; }
        .bot { background: rgba(0, 243, 255, 0.08); border: 1px solid var(--neon); align-self: flex-start; }
        .user { background: #1a1a1a; border: 1px solid #333; align-self: flex-end; }

        /* القائمة الجانبية */
        #drawer { position: fixed; top: 0; right: -290px; width: var(--drawer-w); height: 100%; background: #080808; border-left: 2px solid var(--neon); transition: 0.3s; z-index: 4000; padding: 20px; display: flex; flex-direction: column; }
        #drawer.open { right: 0; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 3500; }

        .new-chat-box { width: 100%; padding: 15px; background: transparent; border: 1px solid #333; border-radius: 12px; color: white; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .new-chat-box:hover { border-color: var(--neon); background: rgba(0,243,255,0.05); }

        .history-section { flex: 1; overflow-y: auto; margin-top: 10px; }
        .history-item { padding: 10px; font-size: 0.85rem; color: #888; border-bottom: 1px solid #111; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .drawer-footer { border-top: 1px solid #222; padding-top: 15px; padding-bottom: 20px; }
        .footer-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #0a0a0a; color: white; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; }
        .footer-btn i { color: var(--neon); }

        .input-bar { padding: 10px 15px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 25px); position: sticky; bottom: 0; }
        #userInput { flex: 1; background: #111; border: 1px solid #333; padding: 12px; border-radius: 25px; color: white; outline: none; }
        #sendBtn { background: var(--neon); border: none; width: 45px; height: 45px; border-radius: 50%; color: black; box-shadow: 0 0 10px var(--neon); flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="login-card">
            <h1 style="color:var(--neon);">⚡  STARK AI </h1>
            <input type="text" id="logUser" placeholder="اسم المستخدم">
            <input type="password" id="logPass" placeholder="كلمة المرور">
            <button class="btn-action" onclick="handleLogin()">دخول للنظام</button>
            <p style="margin-top:20px; font-size:0.9rem; color:#666;">ليس لديك حساب؟ <span style="color:var(--neon);">إنشاء حساب</span></p>
        </div>
    </div>

    <div id="overlay" onclick="toggleDrawer(false)"></div>

    <div id="drawer">
        <div class="new-chat-box" onclick="startNewChat()">
            <span>محادثة جديدة</span>
            <i class="fas fa-edit" style="color:var(--neon);"></i>
        </div>

        <div class="history-section" id="historyList">
            <div style="font-size: 0.7rem; color: #444; margin-bottom: 10px;">سجل المحادثات</div>
        </div>

        <div class="drawer-footer">
            <div class="footer-btn" onclick="toggleMusic()">
                <i class="fas fa-play-circle" id="musicIcon"></i> <span id="musicText">تشغيل الموسيقى</span>
            </div>
            <div class="footer-btn" onclick="window.open('https://t.me/ST_R_4')">
                <i class="fab fa-telegram"></i> المطور @ST_R_4
            </div>
            <div class="footer-btn" onclick="location.reload()" style="border-color: #400;">
                <i class="fas fa-sign-out-alt" style="color: #f00;"></i> خروج
            </div>
        </div>
    </div>

    <div id="app-screen">
        <div class="header">
            <i class="fas fa-bars" style="color:var(--neon); font-size:1.5rem; cursor:pointer;" onclick="toggleDrawer(true)"></i>
            <h2>STARK AI</h2>
            <div style="width:25px;"></div>
        </div>
        <div id="chat-window"></div>
        <div class="input-bar">
            <input type="text" id="userInput" placeholder="اكتب سؤالك بذكاء...">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://files.catbox.moe/18xgpi.m4a" type="audio/mp4">
    </audio>

<script>
    let activeUser = "";
    let isMusicPlaying = false;
    const audio = document.getElementById('bgMusic');

    function handleLogin() {
        const u = document.getElementById('logUser').value.trim();
        const p = document.getElementById('logPass').value.trim();
        if(u && p) {
            activeUser = u;
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('app-screen').style.display = 'flex';
            // رسالة الترحيب حسب اسم المستخدم المدخل
            addBotMessage(`أهلاً بك يا ${activeUser}.. أنا STARK AI جاهز لمساعدتك.`);
        } else { alert("اكتب بياناتك يا بطل!"); }
    }

    function toggleDrawer(open) {
        document.getElementById('drawer').classList.toggle('open', open);
        document.getElementById('overlay').style.display = open ? 'block' : 'none';
    }

    function startNewChat() {
        const win = document.getElementById('chat-window');
        // إذا كان هناك رسائل، نضيف أول رسالة مستخدم للسجل
        if(win.children.length > 1) {
            const userMsgs = win.querySelectorAll('.user');
            const firstMsgText = userMsgs.length > 0 ? userMsgs[0].innerText.replace('👤 ', '') : "محادثة سابقة";
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = "📜 " + (firstMsgText.substring(0, 20)) + "...";
            document.getElementById('historyList').appendChild(item);
        }
        win.innerHTML = "";
        addBotMessage(`أهلاً بك مجدداً يا ${activeUser}.. بدأت محادثة جديدة.`);
        toggleDrawer(false);
    }

    function toggleMusic() {
        const text = document.getElementById('musicText');
        const icon = document.getElementById('musicIcon');
        
        if(!isMusicPlaying) {
            audio.play().then(() => {
                text.innerText = "إيقاف الموسيقى";
                icon.className = "fas fa-pause-circle";
                isMusicPlaying = true;
            }).catch(e => {
                alert("اضغط مرة أخرى لتفعيل الصوت");
            });
        } else {
            audio.pause();
            text.innerText = "تشغيل الموسيقى";
            icon.className = "fas fa-play-circle";
            isMusicPlaying = false;
        }
    }

    function addBotMessage(t) {
        const win = document.getElementById('chat-window');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg bot';
        msgDiv.innerText = "🤖 " + t;
        win.appendChild(msgDiv);
        win.scrollTop = win.scrollHeight;
    }

    async function handleMsg() {
        const inp = document.getElementById('userInput');
        const val = inp.value.trim();
        if(!val) return;
        
        const win = document.getElementById('chat-window');
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.innerText = "👤 " + val;
        win.appendChild(userDiv);
        
        inp.value = "";
        
        const tempId = "L" + Date.now();
        const botDiv = document.createElement('div');
        botDiv.className = 'msg bot';
        botDiv.id = tempId;
        botDiv.innerText = "⚡ ...";
        win.appendChild(botDiv);
        win.scrollTop = win.scrollHeight;
        
        try {
            const r = await fetch("https://text.pollinations.ai/" + encodeURIComponent("You are STARK AI. Answer in Arabic: " + val));
            const text = await r.text();
            document.getElementById(tempId).innerText = "⚡ " + text;
        } catch {
            document.getElementById(tempId).innerText = "❌ السيرفر مضغوط.";
        }
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('sendBtn').onclick = handleMsg;
    document.getElementById('userInput').onkeypress = e => { if(e.key === "Enter") handleMsg(); };
</script>
</body>
</html>
